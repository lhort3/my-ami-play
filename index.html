<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Ami Play UI</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f2f2f2;
}

.app {
    max-width: 420px;
    width: 100%;
    margin: auto;
    background: #ff3c00;
    min-height: 100vh;
    color: white;
    display: flex;
    flex-direction: column;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 20px;
}

.car-section {
    text-align: center;
    padding: 10px 20px;
}

.car-section img {
    width: 70%;
    max-width: 260px;
}

.status {
    display: flex;
    justify-content: space-between;
    padding: 0 20px 20px;
    font-size: 18px;
}

.grid {
    background: white;
    border-radius: 20px 20px 0 0;
    padding: 20px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    flex-grow: 1;
}

.card {
    background: #f7f7f7;
    border-radius: 15px;
    padding: 25px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    transition: 0.2s;
}

.card:active {
    transform: scale(0.97);
}

.card img {
    width: 55px;
    height: 55px;
    object-fit: contain;
}
</style>
</head>

<body>

<div class="app">

    <div class="header">
        <div>My Ami Play</div>
        <div>⇥</div>
    </div>

    <div class="car-section">
        <div>Citroën Ami</div>
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Citroen_Ami_2020.jpg/320px-Citroen_Ami_2020.jpg">
    </div>

    <div class="status">
        <div id="time">--:--</div>
        <div id="date">---</div>
    </div>

    <div class="grid">

        <div class="card" onclick="openApp('maps')">
            <img src="https://img.icons8.com/ios-filled/100/ff3c00/compass.png">
        </div>

        <div class="card" onclick="openApp('phone')">
            <img src="https://img.icons8.com/ios-filled/100/ff3c00/phone.png">
        </div>

        <div class="card" onclick="openApp('radio')">
            <img src="https://img.icons8.com/ios-filled/100/ff3c00/radio.png">
        </div>

        <div class="card" onclick="openApp('music')">
            <img src="https://img.icons8.com/ios-filled/100/ff3c00/musical-notes.png">
        </div>

    </div>

</div>

<script>
function openApp(app) {

    if (app === "maps") {
        window.location.href = "waze://";
        setTimeout(() => {
            window.location.href = "https://www.waze.com";
        }, 1200);
    }

    if (app === "phone") {
        window.location.href = "tel://";
    }

    if (app === "radio") {
        window.location.href = "https://lhort3.github.io/my-ami-play/radio-player";
    }

    if (app === "music") {
        window.location.href = "amazonmusic://";
        setTimeout(() => {
            window.location.href = "https://music.amazon.com";
        }, 1200);
    }
}

function updateClock() {
    const now = new Date();

    let hours = now.getHours();
    const minutes = now.getMinutes();
    const ampm = hours >= 12 ? "PM" : "AM";

    hours = hours % 12;
    if (hours === 0) hours = 12;

    const time =
        String(hours).padStart(2, "0") +
        ":" +
        String(minutes).padStart(2, "0") +
        " " +
        ampm;

    document.getElementById("time").textContent = time;

    const date = now.toLocaleDateString([], {
        weekday: "short",
        day: "2-digit",
        month: "short"
    });

    document.getElementById("date").textContent = date;
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
