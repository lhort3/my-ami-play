<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Ami Play UI</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f2f2f2;
}

.app {
    max-width: 420px;
    width: 100%;
    margin: auto;
    background: #ff3c00;
    min-height: 100vh;
    color: white;
    display: flex;
    flex-direction: column;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 20px;
    font-weight: bold;
}

.title {
    text-align: center;
    font-size: 20px;
}

.car-section {
    text-align: center;
    padding: 10px 20px;
}

.car-section img {
    width: 70%;
    max-width: 260px;
}

.status {
    display: flex;
    justify-content: flex-end;
    padding: 0 20px 20px;
    font-size: 18px;
}

.grid {
    background: white;
    border-radius: 20px 20px 0 0;
    padding: 20px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    flex-grow: 1;
}

.card {
    background: #f7f7f7;
    border-radius: 15px;
    padding: 20px 10px;
    text-align: center;
    color: #ff3c00;
    font-size: 14px;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    transition: 0.2s;
}

.card:active {
    transform: scale(0.97);
}
</style>
</head>

<body>

<div class="app">

    <div class="header">
        <div>☰</div>
        <div class="title">my ami play</div>
        <div>⇥</div>
    </div>

    <div class="car-section">
        <div>Citroën Switch ●</div>
        <div style="font-size:40px;">☀️</div>
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Citroen_Ami_2020.jpg/320px-Citroen_Ami_2020.jpg">
    </div>

    <div class="status">
        <div id="time">--:--</div>
    </div>

    <div class="grid">

        <div class="card" onclick="openApp('nav')">
            🧭<br>Nav
        </div>

        <div class="card" onclick="openApp('phone')">
            📞<br>Phone
        </div>

        <div class="card" onclick="openApp('radio')">
            📻<br>Radio
        </div>

        <div class="card" onclick="openApp('media')">
            🎵<br>Media
        </div>

    </div>

</div>

<script>
function openApp(app) {

    if (app === "nav") {
        // safer fallback navigation
        window.location.href = "https://www.google.com/maps";
    }

    if (app === "phone") {
        alert("Phone app opened");
    }

    if (app === "radio") {
        window.location.href = "https://lhort3.github.io/my-ami-play/radio-player";
    }

    if (app === "media") {
        alert("Media app opened");
    }
}

function updateClock() {
    const now = new Date();

    let hours = now.getHours();
    const minutes = now.getMinutes();

    const time =
        String(hours).padStart(2, "0") +
        ":" +
        String(minutes).padStart(2, "0");

    document.getElementById("time").textContent = time;
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
