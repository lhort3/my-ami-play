<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Ami Play UI</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f2f2f2;
    }

    .app {
        max-width: 420px;
        width: 100%;
        margin: auto;
        background: #ff3c00;
        min-height: 100vh;
        color: white;
        display: flex;
        flex-direction: column;
    }

    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 20px;
        font-weight: bold;
    }

    .title {
        text-align: center;
        font-size: 20px;
    }

    .car-section {
        text-align: center;
        padding: 10px 20px;
    }

    .car-section img {
        width: 70%;
        max-width: 260px;
    }

    .status {
        display: flex;
        justify-content: space-between;
        padding: 0 20px 20px;
        font-size: 18px;
    }

    .grid {
        background: white;
        border-radius: 20px 20px 0 0;
        padding: 20px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
        flex-grow: 1;
    }

    .card {
        background: #f7f7f7;
        border-radius: 15px;
        padding: 20px 10px;
        text-align: center;
        color: #ff3c00;
        font-size: 14px;
        cursor: pointer;
        transition: 0.2s;
    }

    .card:active {
        transform: scale(0.97);
    }

    .card img {
        width: 50px;
        height: 50px;
        object-fit: contain;
        margin-bottom: 8px;
    }
</style>
</head>

<body>

<div class="app">

    <div class="header">
        <div>☰</div>
        <div class="title">my not ami play</div>
        <div>⇥</div>
    </div>

    <div class="car-section">
        <div>Citroën Ami</div>
        <div style="font-size:40px;">☀️</div>
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Citroen_Ami_2020.jpg/320px-Citroen_Ami_2020.jpg">
    </div>

    <div class="status">
        <div>
            <div>21°C</div>
            <small>Sunny</small>
        </div>

        <div style="text-align:right;">
            <div id="time">--:--</div>
            <small id="date">---</small>
        </div>
    </div>

    <div class="grid">

        <div class="card" onclick="openApp('nav')">
            <img src="YOUR_NAV_IMAGE_URL_HERE">
            Nav
        </div>

        <div class="card" onclick="openApp('phone')">
            <img src="YOUR_PHONE_IMAGE_URL_HERE">
            Phone
        </div>

        <div class="card" onclick="openApp('radio')">
            <img src="YOUR_RADIO_IMAGE_URL_HERE">
            Radio
        </div>

        <div class="card" onclick="openApp('media')">
            <img src="YOUR_MEDIA_IMAGE_URL_HERE">
            Media
        </div>

    </div>

</div>

<script>
function openApp(app) {
    if (app === "nav") window.open("waze://", "_blank");
    if (app === "phone") alert("Phone app");
    if (app === "radio") window.open("https://lhort3.github.io/my-ami-play/radio-player", "_blank");
    if (app === "media") alert("Media app");
}

function updateClock() {
    const now = new Date();

    let hours = now.getHours();
    const minutes = now.getMinutes();

    hours = hours % 12;
    if (hours === 0) hours = 12;

    const time =
        String(hours).padStart(2, "0") +
        ":" +
        String(minutes).padStart(2, "0");

    const date = now.toLocaleDateString([], {
        weekday: "short",
        day: "2-digit",
        month: "short"
    });

    document.getElementById("time").textContent = time;
    document.getElementById("date").textContent = date;
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
