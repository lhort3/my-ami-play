<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Radio Player</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#fb5a33;
    font-family:Arial, Helvetica, sans-serif;
    color:white;
}

.player{
    text-align:center;
}

.logo-box{
    width:220px;
    height:220px;
    border-radius:35px;
    border:0px solid #f68;
    overflow:hidden;
    margin:auto;
    margin-bottom:25px;
}

.logo-box img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.song{
    font-size:22px;
    font-weight:bold;
}

.artist{
    opacity:0.7;
    margin-bottom:30px;
}

.play-button{
    width:80px;
    height:80px;
    border-radius:50%;
    border:3px solid white;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    margin:auto;
    font-size:30px;
    transition:0.2s;
}

.play-button:hover{
    transform:scale(1.08);
}

</style>
</head>

<body>

<div class="player">

<div class="logo-box">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT8efETqvqv-ncVuUGZ8-Hu05NtjNQzJ6_32n0XB4v_wQ&s">
</div>

<div class="song">Capital</div>
<div class="artist">My Ami Radio</div>

<div class="play-button" id="playBtn">
⧐
</div>

</div>

<audio id="radio">
<source src="http://media-ice.musicradio.com/CapitalCoventryMP3" type="audio/mpeg">
</audio>

<script>

const audio = document.getElementById("radio");
const btn = document.getElementById("playBtn");

let playing = false;

btn.onclick = function(){

if(!playing){
    audio.play();
    btn.innerHTML = "■";
    playing = true;
}
else{
    audio.pause();
    audio.currentTime = 0;
    btn.innerHTML = "⧐";
    playing = false;
}

};

</script>

</body>
</html>
