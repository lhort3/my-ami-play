<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio Player</title>

<style>

body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#fb5a33;
    font-family:Arial, Helvetica, sans-serif;
    color:white;
    padding:20px;
    box-sizing:border-box;
}

.player{
    text-align:center;
    width:100%;
    max-width:400px;
}

/* Logo scales with screen */
.logo-box{
    width:60vw;
    max-width:220px;
    aspect-ratio:1/1;
    border-radius:20%;
    overflow:hidden;
    margin:auto;
    margin-bottom:20px;
}

.logo-box img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* Text scales */
.song{
    font-size:clamp(18px, 5vw, 24px);
    font-weight:bold;
}

.artist{
    font-size:clamp(14px, 3.5vw, 18px);
    opacity:0.7;
    margin-bottom:25px;
}

/* Button scales */
.play-button{
    width:20vw;
    max-width:80px;
    aspect-ratio:1/1;
    border-radius:50%;
    border:3px solid white;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    margin:auto;
    font-size:clamp(20px, 6vw, 30px);
    transition:0.2s;
}

.play-button:hover{
    transform:scale(1.08);
}

/* Extra small devices */
@media (max-width: 400px){
    .player{
        max-width:90%;
    }
}

</style>
</head>

<body>

<div class="player">

<div class="logo-box">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT8efETqvqv-ncVuUGZ8-Hu05NtjNQzJ6_32n0XB4v_wQ&s">
</div>

<div class="song">Capital</div>
<div class="artist">My Ami Radio</div>

<div class="play-button" id="playBtn">
⧐
</div>

</div>

<audio id="radio">
<source src="http://media-ice.musicradio.com/CapitalCoventryMP3" type="audio/mpeg">
</audio>

<script>

const audio = document.getElementById("radio");
const btn = document.getElementById("playBtn");

let playing = false;

btn.onclick = function(){

if(!playing){
    audio.play();
    btn.innerHTML = "■";
    playing = true;
}
else{
    audio.pause();
    audio.currentTime = 0;
    btn.innerHTML = "⧐";
    playing = false;
}

};

</script>

</body>
</html>
